# Root compose for the cortex-codex-mock-preli mock preliminary.
#
# Three services:
#   - backend    : FastAPI on :8000 (built from ./backend/Dockerfile)
#   - frontend   : teammate-owned Next.js (profile: full; opt-in to build)
#   - normalizer : teammate-owned FastAPI classifier (built from ./normalizer)
#
# Host ports are high numbers in the 38xxx range because the VPS is shared
# with other stacks. Container ports stay at the defaults the apps expect.
#   backend    -> host 38181, container 8000
#   frontend   -> host 38283, container 5173
#   normalizer -> host 38191, container 9000
#
# Override env via a .env file at the repo root or `docker compose --env-file`.
# SQLite lives in a named volume so data survives container restarts.

services:
  backend:
    build:
      context: ./backend
    container_name: cortex-backend
    restart: unless-stopped
    ports:
      - "38181:8000"
    environment:
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: "8000"
      NORMALIZER_URL: http://normalizer:9000
      NORMALIZER_TIMEOUT_S: "20"
      NORMALIZER_MAX_RETRIES: "2"
      NORMALIZER_RETRY_BACKOFF_S: "0.5"
      DATABASE_URL: sqlite:////data/tickets.db
      SAFETY_FAIL_LOUD: "true"
    volumes:
      - backend-data:/data
    healthcheck:
      # /health is the in-process probe from main.py; doesn't touch the normalizer.
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      normalizer:
        condition: service_healthy

  # ---- Frontend (opt-in) -------------------------------------------------
  # Behind a `full` profile so the default `docker compose up -d` only starts
  # backend + normalizer. The frontend's npm install reaches out to the
  # public registry, which can take 5+ minutes on a flaky link and isn't
  # needed for backend-only work or grader checks.
  #
  # To include it explicitly:
  #   docker compose --profile full up -d --build
  # Or bring it up by name from the default profile:
  #   docker compose up -d --build frontend
  frontend:
    profiles: [full]
    build:
      context: ./frontend
    container_name: cortex-frontend
    restart: unless-stopped
    ports:
      - "38283:3000"
    environment:
      # Runtime env for the /api/sort-ticket proxy route (route handler reads
      # this at request time, not build time). Service name `backend` resolves
      # on the compose network; internal port 8000.
      BACKEND_URL: http://backend:8000
    env_file:
      - ./frontend/.env
    depends_on:
      backend:
        condition: service_started

  normalizer:
    build:
      context: ./normalizer
    container_name: cortex-normalizer
    restart: unless-stopped
    ports:
      - "38191:9000"
    env_file:
      - ./normalizer/.env
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  backend-data: