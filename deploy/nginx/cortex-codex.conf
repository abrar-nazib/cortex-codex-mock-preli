# /etc/nginx/sites-available/cortex-codex
#
# Two virtual hosts on the same VPS, fronting docker-compose containers that
# bind high-numbered host ports to avoid colliding with other stacks:
#   - hackathonapi.cortextechnologies.net  -> backend  (host 127.0.0.1:38181)
#   - hackathon.cortextechnologies.net     -> frontend (host 127.0.0.1:38283)
#
# Activate with:
#   sudo ln -s /etc/nginx/sites-available/cortex-codex /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d hackathonapi.cortextechnologies.net \
#                       -d hackathon.cortextechnologies.net
#   sudo systemctl reload nginx
#
# Upstreams talk to 127.0.0.1 because docker-compose publishes the ports to
# the host's loopback. If you switch to a private bridge, point these at the
# container DNS names instead.

# --- Backend -------------------------------------------------------------
server {
    listen 80;
    server_name hackathonapi.cortextechnologies.net;

    # Certbot's http-01 challenge: lets the ACME server reach /.well-known/.
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # Tighten exposure of the API surface; backend is the only listener.
    location / {
        proxy_pass http://127.0.0.1:38181;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # /sort-ticket is the slow one (normalizer round-trip); /health is fast.
        proxy_connect_timeout 5s;
        proxy_send_timeout    35s;
        proxy_read_timeout    35s;
    }
}

# --- Frontend ------------------------------------------------------------
server {
    listen 80;
    server_name hackathon.cortextechnologies.net;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        proxy_pass http://127.0.0.1:38283;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}