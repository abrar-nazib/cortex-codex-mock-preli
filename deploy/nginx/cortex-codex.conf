# /etc/nginx/sites-available/cortex-codex
#
# One virtual host (frontend removed). Fronts the backend container, which
# publishes its port to the host's loopback only:
#   - hackathonapi.cortextechnologies.net  -> backend  (host 127.0.0.1:38181)
#
# Activate with:
#   sudo ln -s /etc/nginx/sites-available/cortex-codex /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d hackathonapi.cortextechnologies.net
#   sudo systemctl reload nginx
#
# The backend binds 127.0.0.1:38181 (loopback), so only nginx on this host can
# reach it — it is never exposed on the public interface directly.

server {
    listen 80;
    server_name hackathonapi.cortextechnologies.net;

    # Certbot's http-01 challenge: lets the ACME server reach /.well-known/.
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # Backend is the only listener. Tighten exposure of the API surface.
    location / {
        proxy_pass http://127.0.0.1:38181;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # /sort-ticket is the slow one (normalizer round-trip); /health is fast.
        proxy_connect_timeout 5s;
        proxy_send_timeout    35s;
        proxy_read_timeout    35s;
    }
}